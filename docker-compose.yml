# Docker Compose for claude-code-mux
# =====================================
#
# 镜像标签:
#   ghcr.io/winffychu/claude-code-mux:latest         ← distroless (~5MB, 生产)
#   ghcr.io/winffychu/claude-code-mux:latest-alpine  ← alpine  (~10MB, 调试)
#   ghcr.io/winffychu/claude-code-mux:latest-busybox ← busybox (~7MB, 受限)
#
# 配置路径: $HOME/.claude-code-mux/config.toml
#   首次启动自动创建默认配置。
#   编辑后重启: docker compose restart ccm
#
# 权限说明:
#   distroless 使用 nonroot (uid 65532), HOME=/home/nonroot
#     镜像内已预建 /home/nonroot/.claude-code-mux 并 chown 给 65532
#     首次启动无需 volume 也能写默认配置。
#     Docker named volume 默认 root 属主, nonroot 写入需:
#       a) 先运行一次初始化: docker compose run --rm -u root ccm chown 65532:65532 /home/nonroot/.claude-code-mux
#       b) 或绑定挂载宿主目录: ./ccm_data:/home/nonroot/.claude-code-mux (宿主目录 chown 65532)
#       本文件使用 user: root 方案 (docker 层面隔离, distroless 无 shell/suid 攻击面为零)
#   alpine/busybox 以 root 运行, 无此问题。
# =====================================

services:
  # ── distroless (生产推荐, 无shell, 含CA证书, ~5MB) ──
  ccm:
    image: ghcr.io/winffychu/claude-code-mux:latest
    container_name: ccm
    user: root
    restart: unless-stopped
    ports:
      - "13456:13456"
    volumes:
      - ccm_data:/home/nonroot/.claude-code-mux
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── alpine 变体 (调试诊断, sh+curl+CA, ~10MB) ──
  ccm-alpine:
    image: ghcr.io/winffychu/claude-code-mux:latest-alpine
    container_name: ccm-alpine
    restart: unless-stopped
    ports:
      - "13457:13456"
    volumes:
      - ccm_data_alpine:/root/.claude-code-mux
    environment:
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:13456/api/config/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── busybox 变体 (资源受限, 无CA, ~7MB) ──
  ccm-busybox:
    image: ghcr.io/winffychu/claude-code-mux:latest-busybox
    container_name: ccm-busybox
    restart: unless-stopped
    ports:
      - "13458:13456"
    volumes:
      - ccm_data_busybox:/root/.claude-code-mux
    environment:
      - RUST_LOG=warn
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ccm_data:
  ccm_data_alpine:
  ccm_data_busybox:

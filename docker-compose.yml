# Docker Compose for claude-code-mux
# =====================================
#
# ghcr.io/winffychu/claude-code-mux:latest          ← distroless (~5MB)
# ghcr.io/winffychu/claude-code-mux:latest-alpine   ← alpine  (~10MB)
# ghcr.io/winffychu/claude-code-mux:latest-busybox  ← busybox (~7MB)
#
# ccm 配置: $HOME/.claude-code-mux/config.toml (首次自动创建)
#
# 权限说明:
#   distroless 镜像运行在 nonroot (uid 65532), HOME=/home/nonroot
#   Docker named volume 默认 root 属主 → nonroot 写不了。
#   因此 distroless 有两种方式:
#
#     ┌────────────────────────────────────────────────────┐
#     │ 方式 A (推荐): bind mount — 真 nonroot            │
#     │   docker compose up -d                            │
#     │   首次: mkdir -p ccm_config                       │
#     │         docker run --rm -v $PWD/ccm_config:/tmp \  │
#     │           alpine chown 65532:65532 /tmp            │
#     ├────────────────────────────────────────────────────┤
#     │ 方式 B: named volume + user:root — 省事          │
#     │   docker compose --profile root up -d             │
#     │   distroless 无 shell/suid, root 依旧安全         │
#     └────────────────────────────────────────────────────┘
#
#   alpine/busybox 默认 root, 不存在此问题。
# =====================================

services:
  # ── distroless — bind mount (真 nonroot) ──
  ccm:
    image: ghcr.io/winffychu/claude-code-mux:latest
    container_name: ccm
    restart: unless-stopped
    ports:
      - "13456:13456"
    volumes:
      - ./ccm_config:/home/nonroot/.claude-code-mux
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── distroless — named volume + root (省事) ──
  ccm-root:
    image: ghcr.io/winffychu/claude-code-mux:latest
    container_name: ccm-root
    profiles: [root]
    user: root
    restart: unless-stopped
    ports:
      - "13457:13456"
    volumes:
      - ccm_root_data:/home/nonroot/.claude-code-mux
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── alpine (调试诊断) ──
  ccm-alpine:
    image: ghcr.io/winffychu/claude-code-mux:latest-alpine
    container_name: ccm-alpine
    profiles: [alpine]
    restart: unless-stopped
    ports:
      - "13458:13456"
    volumes:
      - ccm_alpine_data:/root/.claude-code-mux
    environment:
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:13456/api/config/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── busybox (资源受限) ──
  ccm-busybox:
    image: ghcr.io/winffychu/claude-code-mux:latest-busybox
    container_name: ccm-busybox
    profiles: [busybox]
    restart: unless-stopped
    ports:
      - "13459:13456"
    volumes:
      - ccm_busybox_data:/root/.claude-code-mux
    environment:
      - RUST_LOG=warn
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ccm_root_data:
  ccm_alpine_data:
  ccm_busybox_data:

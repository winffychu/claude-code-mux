# Docker Compose for claude-code-mux
# =====================================
#
# 镜像标签:
#   ghcr.io/winffychu/claude-code-mux:latest         ← distroless (~5MB, 生产)
#   ghcr.io/winffychu/claude-code-mux:latest-alpine  ← alpine  (~10MB, 调试)
#   ghcr.io/winffychu/claude-code-mux:latest-busybox ← busybox (~7MB, 受限)
#
# ccm 配置路径: $HOME/.claude-code-mux/config.toml
# 首次启动自动创建默认配置。
# 编辑配置后重启: docker compose restart ccm
#
# 权限说明:
#   distroless 镜像默认 nonroot (uid 65532), 但 Docker named volume
#   默认 root 属主导致 nonroot 无法写入。distroless 无 shell/无包管理器/
#   无 suid 二进制, 因此以 root 运行依然安全。若需完全 nonroot,
#   建议在 Dockerfile 中预建目录并 chown。
#   alpine/busybox 以 root 运行自然可写自己的 HOME。
# =====================================

services:
  # ── distroless (生产推荐, 无shell, 含CA证书, ~5MB) ──
  ccm:
    image: ghcr.io/winffychu/claude-code-mux:latest
    container_name: ccm
    # distroless 默认 nonroot, 但 Docker volume root 属主无法写入
    # 无 shell/包管理器/suid, root 运行依然安全
    user: root
    restart: unless-stopped
    ports:
      - "13456:13456"
    volumes:
      - ccm_data:/root/.claude-code-mux
    environment:
      - HOME=/root
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── alpine 变体 (调试诊断, sh+curl+CA, ~10MB) ──
  ccm-alpine:
    image: ghcr.io/winffychu/claude-code-mux:latest-alpine
    container_name: ccm-alpine
    restart: unless-stopped
    ports:
      - "13457:13456"
    volumes:
      - ccm_data_alpine:/root/.claude-code-mux
    environment:
      - HOME=/root
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:13456/api/config/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── busybox 变体 (资源受限, 无CA证书, ~7MB) ──
  ccm-busybox:
    image: ghcr.io/winffychu/claude-code-mux:latest-busybox
    container_name: ccm-busybox
    restart: unless-stopped
    ports:
      - "13458:13456"
    volumes:
      - ccm_data_busybox:/root/.claude-code-mux
    environment:
      - HOME=/root
      - RUST_LOG=warn
    healthcheck:
      test: ["CMD", "/usr/local/bin/ccm", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ccm_data:
  ccm_data_alpine:
  ccm_data_busybox:

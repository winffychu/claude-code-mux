name: Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 1. distroless (最小 ~5MB, 纯静态binary) ──
      - name: Build & push (distroless)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: distroless
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # ── 2. alpine (~8MB, 含 curl/ca-certificates) ──
      - name: Build & push (alpine)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: alpine
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-alpine
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # ── 3. busybox (~4MB, 含 shell 工具) ──
      - name: Build & push (busybox)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: busybox
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-busybox
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # ── 4. scratch — 真正最小 (~3MB, 仅有 binary) ──
      - name: Build & push (scratch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: scratch
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-scratch
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Image summary
        run: |
          echo "## Docker images built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '| Variant | Tag | Base | Est. size |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|---|---|' >> $GITHUB_STEP_SUMMARY
          echo '| distroless | `${{ steps.meta.outputs.tags }}` | gcr.io/distroless/static | ~5MB (含系统文件结构) |' >> $GITHUB_STEP_SUMMARY
          echo '| alpine | `${{ steps.meta.outputs.tags }}-alpine` | alpine:3.20 | ~8MB (含 curl + ca-cert) |' >> $GITHUB_STEP_SUMMARY
          echo '| busybox | `${{ steps.meta.outputs.tags }}-busybox` | busybox:glibc | ~4MB (含 shell) |' >> $GITHUB_STEP_SUMMARY
          echo '| scratch | `${{ steps.meta.outputs.tags }}-scratch` | scratch (空) | ~3MB (仅 binary, 最小) |' >> $GITHUB_STEP_SUMMARY

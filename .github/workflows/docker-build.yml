name: 🐳 Docker Build Matrix

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        variant:
          - id: glibc-distroless
            target: glibc-distroless
            desc: "glibc + distroless/cc"
          - id: glibc-busybox
            target: glibc-busybox
            desc: "glibc + busybox:glibc"
          - id: glibc-alpine
            target: glibc-alpine
            desc: "glibc + alpine+gcompat"
          - id: musl-distroless
            target: musl-distroless
            desc: "musl(静态) + distroless/static"
          - id: musl-busybox
            target: musl-busybox
            desc: "musl(静态) + busybox:glibc"
          - id: musl-alpine
            target: musl-alpine
            desc: "musl(静态) + alpine"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.variant.desc }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.variant.target }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant.id }}
          provenance: false

      - name: Inspect ${{ matrix.variant.desc }}
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant.id }}"

          BYTES=$(docker image inspect "$IMG" --format '{{.Size}}' 2>/dev/null || echo 0)
          MB=$(python3 -c "print(f'{float($BYTES)/1024/1024:.1f}')" 2>/dev/null || echo "?")

          echo "### ${{ matrix.variant.desc }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像大小**: $MB MB" >> $GITHUB_STEP_SUMMARY

          # 检查 binary 是否可执行
          if docker run --rm --entrypoint /usr/local/bin/ccm "$IMG" --version 2>/dev/null; then
            echo "- **Binary**: ✅ ccm --version 正常" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Binary**: ❌ 启动失败" >> $GITHUB_STEP_SUMMARY
          fi

          # 检查有无 shell
          if docker run --rm --entrypoint sh "$IMG" -c "echo shell-ok" 2>/dev/null | grep -q shell-ok; then
            echo "- **Shell**: ✅ 有 sh" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Shell**: ❌ 无 shell" >> $GITHUB_STEP_SUMMARY
          fi

          # 检查 CA 证书
          if docker run --rm --entrypoint sh "$IMG" -c "ls /etc/ssl/certs/ 2>/dev/null | head -1" 2>/dev/null | grep -q .; then
            echo "- **CA 证书**: ✅ 有" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **CA 证书**: ❌ 无（HTTPS 可能失败）" >> $GITHUB_STEP_SUMMARY
          fi

          # ldd 检查
          LDD=$(docker run --rm --entrypoint sh "$IMG" -c "ldd /usr/local/bin/ccm 2>&1" 2>/dev/null)
          if echo "$LDD" | grep -q "not a dynamic executable"; then
            echo "- **链接方式**: 🔒 静态链接 (musl)" >> $GITHUB_STEP_SUMMARY
          elif [ -n "$LDD" ]; then
            echo "- **链接方式**: 🔗 动态链接 (glibc)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$LDD" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "- **链接方式**: ? 无 shell 无法检查" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
